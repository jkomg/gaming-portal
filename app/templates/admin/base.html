<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>{% block title %}Admin{% endblock %} — jkomg Gaming</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    {% block head %}{% endblock %}
</head>
<body class="admin-body">

<nav class="navbar navbar-dark sticky-top" style="background:#161b22;border-bottom:1px solid rgba(255,255,255,0.08);">
    <div class="container-xl d-flex align-items-center gap-3">
        <a class="navbar-brand fw-semibold" href="{{ url_for('admin.index') }}">
            <i class="bi bi-controller me-2"></i>jkomg Admin
        </a>
        <div class="ms-auto d-flex align-items-center gap-2">
            <a href="{{ url_for('portal.index') }}" class="btn btn-sm btn-outline-secondary">
                <i class="bi bi-house me-1"></i>Portal
            </a>
            <a href="{{ url_for('auth.logout') }}" class="btn btn-sm btn-outline-secondary">
                <i class="bi bi-box-arrow-right me-1"></i>Sign Out
            </a>
        </div>
    </div>
</nav>

<div class="container-xl py-4 px-3 px-md-4">
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
    <div class="alert alert-{{ cat }} alert-dismissible fade show">
        {{ msg }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endfor %}
    {% endwith %}

    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function () {
    const token = document.querySelector('meta[name="csrf-token"]')?.content;
    if (!token) return;
    document.querySelectorAll('form[method="POST"], form[method="post"]').forEach(function (form) {
        if (form.querySelector('input[name="csrf_token"]')) return;
        const input = document.createElement('input');
        input.type = 'hidden'; input.name = 'csrf_token'; input.value = token;
        form.prepend(input);
    });
});
</script>
{% block scripts %}{% endblock %}
</body>
</html>

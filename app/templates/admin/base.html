<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>{% block title %}Admin{% endblock %} — jkomg Gaming</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    <style>
        body { background: var(--bg); color: var(--text); font-family: var(--font-ui); }
        .admin-nav {
            background: rgba(11,13,16,.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 0 32px;
            position: sticky; top: 0; z-index: 100;
        }
        .admin-nav-inner {
            max-width: 1180px; margin: 0 auto;
            display: flex; align-items: center; gap: 16px; height: 54px;
        }
        .admin-brand {
            display: flex; align-items: center; gap: 8px;
            font-weight: 700; font-size: 14px; color: var(--text);
            text-decoration: none;
        }
        .admin-brand-mark {
            width: 22px; height: 22px; border-radius: 5px;
            background: linear-gradient(135deg, #d83a4a, #a64dff);
        }
        .admin-brand-kicker {
            font-size: 10px; text-transform: uppercase; letter-spacing: .1em;
            color: var(--text-faint); font-weight: 500;
        }
        .admin-nav-sep {
            width: 1px; height: 18px;
            background: var(--border-strong); margin: 0 4px;
        }
        .admin-content { max-width: 1180px; margin: 0 auto; padding: 32px 32px 80px; }
        @media (max-width: 600px) { .admin-content { padding: 20px 16px 60px; } }

        /* Table */
        .admin-table { width: 100%; border-collapse: collapse; font-size: 14px; }
        .admin-table th {
            font-size: 10px; text-transform: uppercase; letter-spacing: .1em;
            color: var(--text-faint); font-weight: 600;
            padding: 10px 14px; border-bottom: 1px solid var(--border-strong);
            text-align: left; white-space: nowrap;
        }
        .admin-table td {
            padding: 12px 14px; border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }
        .admin-table tr:last-child td { border-bottom: none; }
        .admin-table tr:hover td { background: rgba(255,255,255,.02); }

        /* Cards */
        .admin-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--r-card); overflow: hidden; margin-bottom: 20px;
        }
        .admin-card-header {
            padding: 12px 18px;
            font-size: 11px; font-weight: 600; text-transform: uppercase;
            letter-spacing: .12em; color: var(--text-faint);
            border-bottom: 1px solid var(--border);
        }
        .admin-card-body { padding: 20px 18px; }

        /* Form controls */
        .form-control, .form-select, textarea.form-control {
            background: var(--surface-2) !important;
            border: 1px solid var(--border-strong) !important;
            border-radius: 8px !important;
            color: var(--text) !important;
            font-family: var(--font-ui) !important;
            font-size: 13px !important;
        }
        .form-control:focus, .form-select:focus {
            border-color: color-mix(in srgb, var(--accent, #d83a4a) 50%, transparent) !important;
            box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent, #d83a4a) 10%, transparent) !important;
            background: var(--surface-2) !important;
            color: var(--text) !important;
        }
        .form-control::placeholder { color: var(--text-faintest) !important; }
        .form-label {
            font-size: 11px; font-weight: 600; text-transform: uppercase;
            letter-spacing: .1em; color: var(--text-faint); margin-bottom: 6px;
        }
        .form-text { font-size: 11px; color: var(--text-faintest) !important; }
        .form-check-input {
            background-color: var(--surface-2) !important;
            border-color: var(--border-strong) !important;
        }
        .form-check-input:checked { background-color: var(--accent, #d83a4a) !important; border-color: var(--accent, #d83a4a) !important; }
        .form-check-label { font-size: 13px; color: var(--text-muted); }

        /* Badges */
        .badge-status-active   { background: rgba(74,222,128,.15); color: #4ade80; border: 1px solid rgba(74,222,128,.25); border-radius: 999px; padding: 2px 8px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; }
        .badge-status-draft    { background: rgba(255,255,255,.07); color: var(--text-muted); border: 1px solid var(--border-strong); border-radius: 999px; padding: 2px 8px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; }
        .badge-status-upcoming { background: rgba(96,165,250,.15); color: #60a5fa; border: 1px solid rgba(96,165,250,.25); border-radius: 999px; padding: 2px 8px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; }
        .badge-status-other    { background: rgba(255,255,255,.04); color: var(--text-faint); border: 1px solid var(--border); border-radius: 999px; padding: 2px 8px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; }

        /* Page header */
        .admin-page-title { font-family: var(--font-display); font-size: 28px; font-weight: 600; color: var(--text); margin: 0; }
        .admin-page-kicker { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .14em; color: var(--text-faint); margin-bottom: 4px; }
    </style>
    {% block head %}{% endblock %}
</head>
<body>

<nav class="admin-nav">
    <div class="admin-nav-inner">
        <a class="admin-brand" href="{{ url_for('admin.index') }}">
            <div class="admin-brand-mark"></div>
            <div>
                <div style="line-height:1;">jkomg</div>
                <div class="admin-brand-kicker">Admin</div>
            </div>
        </a>
        <div class="admin-nav-sep"></div>
        <div class="ms-auto d-flex align-items-center gap-2">
            <a href="{{ url_for('portal.index') }}" class="btn-ghost" style="font-size:12px;padding:5px 12px;">
                <i class="bi bi-house"></i> Portal
            </a>
            <a href="{{ url_for('auth.logout') }}" class="btn-ghost" style="font-size:12px;padding:5px 10px;" title="Sign out">
                <i class="bi bi-box-arrow-right"></i>
            </a>
        </div>
    </div>
</nav>

<div class="admin-content">
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
    <div class="alert alert-dismissible fade show mb-3"
         style="background:var(--surface);border:1px solid var(--border-strong);border-left:3px solid {% if cat == 'success' %}#4ade80{% else %}var(--accent,#d83a4a){% endif %};border-radius:var(--r-card);color:var(--text);font-size:13px;">
        {{ msg }}
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"></button>
    </div>
    {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function () {
    const token = document.querySelector('meta[name="csrf-token"]')?.content;
    if (!token) return;
    document.querySelectorAll('form[method="POST"], form[method="post"]').forEach(function (form) {
        if (form.querySelector('input[name="csrf_token"]')) return;
        const inp = document.createElement('input');
        inp.type = 'hidden'; inp.name = 'csrf_token'; inp.value = token;
        form.prepend(inp);
    });
});
</script>
{% block scripts %}{% endblock %}
</body>
</html>

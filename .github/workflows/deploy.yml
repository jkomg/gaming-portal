name: Deploy to Cloud Run

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

env:
  PROJECT: jkomg-gaming
  REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev
  AR_REPO: gaming-repo
  SERVICE: gaming-portal

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/947378962657/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: github-actions-deploy@jkomg-gaming.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build and push image
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.PROJECT }}/${{ env.AR_REPO }}/${{ env.SERVICE }}:${{ github.event.workflow_run.head_sha }}
        run: |
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Deploy to Cloud Run
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.PROJECT }}/${{ env.AR_REPO }}/${{ env.SERVICE }}:${{ github.event.workflow_run.head_sha }}
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image "$IMAGE" \
            --project ${{ env.PROJECT }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --memory=256Mi \
            --update-secrets="SECRET_KEY=SECRET_KEY:latest,DISCORD_CLIENT_ID=DISCORD_CLIENT_ID:latest,DISCORD_CLIENT_SECRET=DISCORD_CLIENT_SECRET:latest,ALLOWED_DISCORD_IDS=ALLOWED_DISCORD_IDS:latest,DISCORD_REDIRECT_URI=DISCORD_REDIRECT_URI:latest,NOTION_TOKEN=NOTION_TOKEN:latest,DATABASE_URL=DATABASE_URL:latest,TURSO_AUTH_TOKEN=TURSO_AUTH_TOKEN:latest" \
            --quiet
